version: "3.7"

services:
  site:
    image: plantaotec-site:latest
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.site.rule=Host(`plantaotec.com.br`) || Host(`www.plantaotec.com.br`)
        - traefik.http.routers.site.entrypoints=websecure
        - traefik.http.routers.site.tls.certresolver=letsencryptresolver
        - traefik.http.services.site.loadbalancer.server.port=80
        - traefik.http.routers.site.middlewares=site-https
        - traefik.http.middlewares.site-https.headers.sslproxyheaders.X-Forwarded-Proto=https

networks:
  network_public:
    external: true
